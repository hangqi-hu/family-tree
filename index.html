<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡氏家族世系图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: linear-gradient(180deg, #faf6f0 0%, #f0e8d8 100%);
            min-height: 100vh;
            overflow: auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px 12px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #2c2c2c;
            letter-spacing: 6px;
        }

        .header h1 .accent { color: #c0392b; }

        .header .subtitle {
            font-size: 14px;
            color: #999;
            margin-top: 8px;
        }

        /* 图例 */
        .legend-bar {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 16px 20px 8px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid;
        }

        .legend-line {
            width: 28px;
            height: 3px;
            border-radius: 2px;
        }

        /* 主画布 */
        .tree-container {
            display: flex;
            justify-content: center;
            padding: 20px 40px 60px;
            overflow: auto;
        }

        svg {
            display: block;
        }

        /* 世代标签 */
        .gen-label {
            font-size: 13px;
            fill: #bbb;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .gen-line {
            stroke: #e8e0d4;
            stroke-width: 1;
            stroke-dasharray: 6 4;
        }

        /* 节点卡片 */
        .node-group {
            cursor: pointer;
        }

        .node-card {
            rx: 12;
            ry: 12;
            stroke-width: 2.5;
            transition: all 0.2s;
        }

        .node-group:hover .node-card {
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.2));
            stroke-width: 3;
        }

        .node-name {
            font-size: 16px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: central;
        }

        .node-gender {
            font-size: 11px;
            text-anchor: middle;
            dominant-baseline: central;
        }

        /* 连线 */
        .link-parent {
            fill: none;
            stroke: #2980b9;
            stroke-width: 2;
            opacity: 0.6;
        }

        .link-spouse {
            stroke: #e74c3c;
            stroke-width: 2.5;
            opacity: 0.7;
        }

        .link-label {
            font-size: 11px;
            fill: #888;
            text-anchor: middle;
            dominant-baseline: central;
        }

        .spouse-symbol {
            font-size: 14px;
            fill: #c0392b;
            text-anchor: middle;
            dominant-baseline: central;
        }

        /* 高亮效果 */
        .dimmed {
            opacity: 0.15 !important;
            transition: opacity 0.2s;
        }

        .highlighted {
            opacity: 1 !important;
            transition: opacity 0.2s;
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(44, 44, 44, 0.92);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.7;
            max-width: 280px;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .tooltip .name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tooltip .info {
            color: #f1c40f;
            font-size: 12px;
        }

        .tooltip .rels {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 13px;
        }

        /* 底部提示 */
        .footer {
            text-align: center;
            padding: 16px 0 32px;
            font-size: 12px;
            color: #bbb;
        }

        /* 我 的标识 */
        .me-badge {
            fill: #c0392b;
            font-size: 10px;
            text-anchor: middle;
            dominant-baseline: central;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>胡氏 <span class="accent">·</span> 家族世系图</h1>
    <div class="subtitle">以胡航琦为主线 · 悬停人物查看关系</div>
</div>

<div class="legend-bar">
    <div class="legend-item">
        <div class="legend-dot" style="background:#e8f4fd; border-color:#2980b9;"></div>
        男性
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background:#fef0f5; border-color:#e91e63;"></div>
        女性
    </div>
    <div class="legend-item">
        <div class="legend-line" style="background:#e74c3c;"></div>
        配偶
    </div>
    <div class="legend-item">
        <div class="legend-line" style="background:#2980b9;"></div>
        亲子
    </div>
</div>

<div class="tree-container">
    <svg id="tree"></svg>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="footer">💡 悬停节点可查看人物详情和关系</div>

<script>
// ============================================================
// 胡氏家族数据
// ============================================================

// 人员数据：gen=世代（0=最高辈）
const people = [
    // 第一代：爷爷奶奶
    { id: "胡文贵", gen: 0, gender: "m", desc: "祖父" },
    { id: "裘金娟", gen: 0, gender: "f", desc: "祖母" },

    // 第二代：父母 & 叔叔
    { id: "胡香成", gen: 1, gender: "m", desc: "父亲·长子", parentId: "胡文贵" },
    { id: "项晓飞", gen: 1, gender: "f", desc: "母亲", parentId: null },
    { id: "胡香明", gen: 1, gender: "m", desc: "叔叔·次子", parentId: "胡文贵" },

    // 第三代：我 & 堂兄弟
    { id: "胡航琦", gen: 2, gender: "m", desc: "我·胡香成之子", parentId: "胡香成", isMe: true },
    { id: "胡航煜", gen: 2, gender: "m", desc: "堂弟·胡香明之子", parentId: "胡香明" },
];

// 配偶关系
const spouses = [
    { a: "胡文贵", b: "裘金娟" },
    { a: "胡香成", b: "项晓飞" },
];

// 建立映射
const personMap = {};
people.forEach(p => personMap[p.id] = p);

// ============================================================
// 布局计算
// ============================================================
const nodeW = 130, nodeH = 60;
const hGap = 60;       // 水平间距
const vGap = 180;      // 垂直间距（世代间距）
const topMargin = 80;
const spouseGap = 20;  // 配偶之间的间距

// 按世代分组
const gens = {};
people.forEach(p => {
    if (!gens[p.gen]) gens[p.gen] = [];
    gens[p.gen].push(p);
});

// 计算每代的 x 坐标
// 第一代：爷爷奶奶（配偶并排）
// 第二代：父母（配偶并排）+ 叔叔
// 第三代：我 + 堂弟

const centerX = 500;

// 第一代布局
const gen0 = gens[0]; // 胡文贵, 裘金娟
gen0[0]._x = centerX - nodeW/2 - spouseGap/2 - nodeW/2; // 胡文贵
gen0[0]._y = topMargin;
gen0[1]._x = centerX - nodeW/2 - spouseGap/2 + nodeW/2 + spouseGap; // 裘金娟
gen0[1]._y = topMargin;

// 调整：让配偶紧挨着
gen0[0]._x = centerX - nodeW - spouseGap/2;
gen0[1]._x = centerX + spouseGap/2;

// 第二代布局
const gen1Y = topMargin + vGap;
const gen1 = gens[1]; // 胡香成, 项晓飞, 胡香明

// 胡香成 & 项晓飞（夫妻）在左，胡香明在右
gen1[0]._x = centerX - nodeW - 80 - spouseGap/2; // 胡香成
gen1[0]._y = gen1Y;
gen1[1]._x = centerX - 80 + spouseGap/2;          // 项晓飞
gen1[1]._y = gen1Y;
gen1[2]._x = centerX + nodeW + 80;                // 胡香明
gen1[2]._y = gen1Y;

// 第三代布局
const gen2Y = topMargin + vGap * 2;
const gen2 = gens[2]; // 胡航琦, 胡航煜

gen2[0]._x = centerX - 100; // 胡航琦（我）
gen2[0]._y = gen2Y;
gen2[1]._x = centerX + nodeW + 180; // 胡航煜
gen2[1]._y = gen2Y;

// 计算 SVG 尺寸
const allX = people.map(p => p._x);
const allY = people.map(p => p._y);
const svgW = Math.max(...allX) + nodeW + 120;
const svgH = Math.max(...allY) + nodeH + 80;

// ============================================================
// 绘制 SVG
// ============================================================
const svg = document.getElementById("tree");
svg.setAttribute("width", svgW);
svg.setAttribute("height", svgH);

// --- 世代分隔线 ---
for (let g = 0; g <= 2; g++) {
    const y = topMargin + g * vGap;
    const labels = ["祖辈", "父辈", "我辈"];

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", 20);
    line.setAttribute("x2", svgW - 20);
    line.setAttribute("y1", y);
    line.setAttribute("y2", y);
    line.setAttribute("class", "gen-line");
    svg.appendChild(line);

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", 16);
    text.setAttribute("y", y - 10);
    text.setAttribute("class", "gen-label");
    text.textContent = labels[g];
    svg.appendChild(text);
}

// --- 辅助函数 ---
function createPath(x1, y1, x2, y2) {
    const midY = (y1 + y2) / 2;
    return `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`;
}

function addLink(x1, y1, x2, y2, color, dasharray, cssClass) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", createPath(x1, y1, x2, y2));
    path.setAttribute("stroke", color);
    path.setAttribute("stroke-dasharray", dasharray || "none");
    path.setAttribute("class", cssClass);
    svg.appendChild(path);
    return path;
}

function addSpouseLine(p1, p2) {
    // 配偶之间画横线
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", p1._x + nodeW/2);
    line.setAttribute("y1", p1._y + nodeH/2);
    line.setAttribute("x2", p2._x + nodeW/2);
    line.setAttribute("y2", p2._y + nodeH/2);
    line.setAttribute("class", "link-spouse");
    svg.appendChild(line);

    // 中间放个爱心
    const heart = document.createElementNS("http://www.w3.org/2000/svg", "text");
    heart.setAttribute("x", (p1._x + p2._x) / 2 + nodeW/2);
    heart.setAttribute("y", p1._y + nodeH/2 - 12);
    heart.setAttribute("class", "spouse-symbol");
    heart.textContent = "♡";
    svg.appendChild(heart);
}

// --- 存储所有元素用于高亮 ---
const linkElements = [];
const nodeElements = {};

// --- 绘制配偶连线 ---
spouses.forEach(s => {
    const a = personMap[s.a];
    const b = personMap[s.b];
    if (!a || !b) return;
    addSpouseLine(a, b);
    linkElements.push({ from: s.a, to: s.b, type: "spouse" });
});

// --- 绘制亲子连线 ---
people.forEach(p => {
    if (!p.parentId) return;
    const parent = personMap[p.parentId];
    if (!parent) return;

    // 找到父母的中心点
    const spouseOfParent = spouses.find(s => s.a === p.parentId || s.b === p.parentId);
    let parentCenterX = parent._x + nodeW/2;

    if (spouseOfParent) {
        const spouse = personMap[spouseOfParent.a === p.parentId ? spouseOfParent.b : spouseOfParent.a];
        parentCenterX = (parent._x + spouse._x) / 2 + nodeW/2;
    }

    const path = addLink(
        parentCenterX, parent._y + nodeH,
        p._x + nodeW/2, p._y,
        "#2980b9", "none", "link-parent"
    );
    path.dataset.from = p.parentId;
    path.dataset.to = p.id;
    linkElements.push({ from: p.parentId, to: p.id, type: "parent", el: path });
});

// --- 绘制节点 ---
people.forEach(p => {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "node-group");
    g.setAttribute("transform", `translate(${p._x}, ${p._y})`);
    g.dataset.id = p.id;

    // 卡片颜色
    const isMale = p.gender === "m";
    const bgColor = isMale ? "#e8f4fd" : "#fef0f5";
    const borderColor = isMale ? "#2980b9" : "#e91e63";
    const textColor = isMale ? "#2471a3" : "#c2185b";

    // 如果是"我"，加特殊边框
    if (p.isMe) {
        const highlight = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        highlight.setAttribute("x", -4);
        highlight.setAttribute("y", -4);
        highlight.setAttribute("width", nodeW + 8);
        highlight.setAttribute("height", nodeH + 8);
        highlight.setAttribute("rx", 14);
        highlight.setAttribute("ry", 14);
        highlight.setAttribute("fill", "none");
        highlight.setAttribute("stroke", "#c0392b");
        highlight.setAttribute("stroke-width", 3);
        highlight.setAttribute("stroke-dasharray", "6 3");
        g.appendChild(highlight);

        // "我" 标记
        const badge = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        badge.setAttribute("x", nodeW - 20);
        badge.setAttribute("y", -8);
        badge.setAttribute("width", 24);
        badge.setAttribute("height", 16);
        badge.setAttribute("rx", 8);
        badge.setAttribute("fill", "#c0392b");
        g.appendChild(badge);

        const badgeText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        badgeText.setAttribute("x", nodeW - 8);
        badgeText.setAttribute("y", 0);
        badgeText.setAttribute("class", "me-badge");
        badgeText.setAttribute("fill", "#fff");
        badgeText.textContent = "我";
        g.appendChild(badgeText);
    }

    // 主卡片
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("width", nodeW);
    rect.setAttribute("height", nodeH);
    rect.setAttribute("class", "node-card");
    rect.setAttribute("fill", bgColor);
    rect.setAttribute("stroke", borderColor);
    g.appendChild(rect);

    // 名字
    const name = document.createElementNS("http://www.w3.org/2000/svg", "text");
    name.setAttribute("x", nodeW/2);
    name.setAttribute("y", nodeH/2 - 6);
    name.setAttribute("class", "node-name");
    name.setAttribute("fill", textColor);
    name.textContent = p.id;
    g.appendChild(name);

    // 性别标识
    const gender = document.createElementNS("http://www.w3.org/2000/svg", "text");
    gender.setAttribute("x", nodeW/2);
    gender.setAttribute("y", nodeH/2 + 14);
    gender.setAttribute("class", "node-gender");
    gender.setAttribute("fill", "#999");
    gender.textContent = isMale ? "♂" : "♀";
    g.appendChild(gender);

    svg.appendChild(g);
    nodeElements[p.id] = { el: g, data: p };

    // 交互事件
    g.addEventListener("mouseenter", (e) => highlightNode(p.id, e));
    g.addEventListener("mousemove", (e) => moveTooltip(e));
    g.addEventListener("mouseleave", clearHighlight);
});

// ============================================================
// 交互逻辑
// ============================================================
const tooltip = document.getElementById("tooltip");

function getRelations(nodeId) {
    const rels = [];

    // 配偶
    spouses.forEach(s => {
        if (s.a === nodeId) rels.push({ other: s.b, rel: "配偶" });
        if (s.b === nodeId) rels.push({ other: s.a, rel: "配偶" });
    });

    // 亲子
    people.forEach(p => {
        if (p.parentId === nodeId) {
            rels.push({ other: p.id, rel: p.gender === "m" ? "儿子" : "女儿" });
        }
        if (p.id === nodeId && p.parentId) {
            const parent = personMap[p.parentId];
            if (parent) rels.push({ other: p.parentId, rel: parent.gender === "m" ? "父亲" : "母亲" });
        }
    });

    // 兄弟姐妹（同父母）
    const me = personMap[nodeId];
    if (me && me.parentId) {
        people.forEach(p => {
            if (p.id !== nodeId && p.parentId === me.parentId) {
                rels.push({ other: p.id, rel: p.gender === "m" ? "兄弟" : "姐妹" });
            }
        });
    }

    return rels;
}

function highlightNode(nodeId, event) {
    const rels = getRelations(nodeId);
    const connectedIds = new Set([nodeId, ...rels.map(r => r.other)]);

    // 淡化不相关的节点
    Object.values(nodeElements).forEach(n => {
        if (!connectedIds.has(n.data.id)) {
            n.el.classList.add("dimmed");
        } else {
            n.el.classList.add("highlighted");
        }
    });

    // 淡化不相关的连线
    linkElements.forEach(l => {
        if (l.from === nodeId || l.to === nodeId) {
            if (l.el) l.el.classList.add("highlighted");
            l.el?.classList.remove("dimmed");
        } else {
            if (l.el) l.el.classList.add("dimmed");
        }
    });

    // Tooltip
    const p = personMap[nodeId];
    const relHtml = rels.map(r => `→ ${r.other}：${r.rel}`).join("<br>");
    tooltip.innerHTML = `
        <div class="name">${p.id}</div>
        <div class="info">${p.desc}</div>
        <div class="rels">${relHtml || "无其他关系"}</div>
    `;
    tooltip.style.opacity = "1";
    moveTooltip(event);
}

function moveTooltip(e) {
    tooltip.style.left = (e.pageX + 16) + "px";
    tooltip.style.top = (e.pageY - 10) + "px";
}

function clearHighlight() {
    Object.values(nodeElements).forEach(n => {
        n.el.classList.remove("dimmed", "highlighted");
    });
    linkElements.forEach(l => {
        if (l.el) l.el.classList.remove("dimmed", "highlighted");
    });
    tooltip.style.opacity = "0";
}
</script>

</body>
</html>
