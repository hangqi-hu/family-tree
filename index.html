];
const personMap = {};
people.forEach(p => personMap[p.id] = p);
// Build spouse lookup
const spouseOf = {};
spouses.forEach(s => { spouseOf[s.a] = s.b; spouseOf[s.b] = s.a; });
// Build children lookup
const childrenOf = {};
people.forEach(p => {
    if (p.parentId) {
        if (!childrenOf[p.parentId]) childrenOf[p.parentId] = [];
        childrenOf[p.parentId].push(p.id);
    }
});
// ============================================================
// 响应式布局
// ============================================================
function isMobile() { return window.innerWidth <= 600; }
function getLayout() {
    const mobile = isMobile();
    const nodeW = mobile ? 85 : 120;
    const nodeH = mobile ? 46 : 56;
    const spouseGap = mobile ? 10 : 18;
    const vGap = mobile ? 110 : 170;
    const topMargin = mobile ? 50 : 75;
    const sibGap = mobile ? 8 : 12;
    const groupGap = mobile ? 30 : 50;
    return { mobile, nodeW, nodeH, spouseGap, vGap, topMargin, sibGap, groupGap };
}
// Gen1 birth order (children of 胡自林):
const gen1BirthOrder = ["胡文华","胡文荣","胡文贵","胡文富","胡文娟","胡荣娟","胡珍娟","胡秋娟"];
// Gen2 children ordering per parent:

const gen3Order = {

/**
 * Recursive layout:
 * 1. calcSubtreeWidth(personId): returns the width needed for this person's subtree
 * 2. assignPositions(personId, leftX, y): assigns _x, _y to this person and all descendants
 */
function calcSubtreeWidth(pid, L) {
    const { nodeW, spouseGap, sibGap } = L;
    const spouseId = spouseOf[pid];
    const isCouple = spouseId && personMap[spouseId] && personMap[spouseId].gen === personMap[pid].gen;
    const selfW = isCouple ? (2 * nodeW + spouseGap) : nodeW;
    const childIds = getOrderedChildren(pid);
    if (childIds.length === 0) return selfW;
    let childrenTotalW = 0;
    childIds.forEach((cid, i) => {
        childrenTotalW += calcSubtreeWidth(cid, L);
        if (i > 0) childrenTotalW += sibGap;
    });
    return Math.max(selfW, childrenTotalW);
}
function assignPositions(pid, leftX, y, L) {
    const { nodeW, nodeH, spouseGap, sibGap, vGap } = L;
    const p = personMap[pid];
    const spouseId = spouseOf[pid];
    const isCouple = spouseId && personMap[spouseId] && personMap[spouseId].gen === p.gen;
    const selfW = isCouple ? (2 * nodeW + spouseGap) : nodeW;
    const subtreeW = calcSubtreeWidth(pid, L);
    // Position this person (and spouse) centered within subtreeW
    const selfLeft = leftX + (subtreeW - selfW) / 2;
    p._x = selfLeft;
    p._y = y;
    if (isCouple) {
        personMap[spouseId]._x = selfLeft + nodeW + spouseGap;
        personMap[spouseId]._y = y;
    }
    // Position children
    const childIds = getOrderedChildren(pid);
    if (childIds.length === 0) return;
    let childLeft = leftX;
    const childY = y + vGap;
    childIds.forEach((cid, i) => {
        const cw = calcSubtreeWidth(cid, L);
        assignPositions(cid, childLeft, childY, L);
        childLeft += cw + sibGap;
    });
}

    totalGen1W += w7;
    // 胡秋娟+袁南儿 subtree
    const w8 = calcSubtreeWidth("胡秋娟", L);
    gen1Groups.push({ primary: "胡秋娟", width: w8 });
    totalGen1W += w8;
    // Gap before 项家
    totalGen1W += groupGap;
    // 项林国+闻东女 subtree
    const w9 = calcSubtreeWidth("项林国", L);
    gen1Groups.push({ primary: "项林国", width: w9 });
    totalGen1W += w9;
    // Add sibGaps between all gen1 groups
    totalGen1W += (gen1Groups.length - 1) * sibGap;
    // Now calculate total tree width
    const totalTreeW = Math.max(gen0SubtreeW, totalGen1W);
    // Center gen0
    const gen0Left = (totalTreeW - gen0SubtreeW) / 2;
    const gen0Y = topMargin;
    personMap["胡自林"]._x = gen0Left + (gen0SubtreeW - 2 * nodeW - L.spouseGap) / 2;
    personMap["胡自林"]._y = gen0Y;
    personMap["陈琴连"]._x = personMap["胡自林"]._x + nodeW + L.spouseGap;
    personMap["陈琴连"]._y = gen0Y;
    // Position gen1 groups
    const gen1Y = topMargin + vGap;
    let gen1Left = (totalTreeW - totalGen1W) / 2;
    gen1Groups.forEach((grp, i) => {
        const pid = grp.primary;
        assignPositions(pid, gen1Left, gen1Y, L);
        gen1Left += grp.width + sibGap;
        // Add groupGap after 胡文富(gen1Groups[3]) and after 胡秋娟(gen1Groups[7])
        if (i === 3 || i === 7) {
            gen1Left += groupGap - sibGap;
        }
    });
    
    // 特殊处理：将项晓飞放在胡香成旁边（配偶关系）
    if (personMap["胡香成"] && personMap["项晓飞"] && 
        personMap["胡香成"]._x !== undefined && personMap["项晓飞"]._x !== undefined) {
        const nodeW = L.nodeW;
        const spouseGap = L.spouseGap;
        // 将项晓飞放在胡香成的右边（作为配偶）
        personMap["项晓飞"]._x = personMap["胡香成"]._x + nodeW + spouseGap;
        personMap["项晓飞"]._y = personMap["胡香成"]._y;
    }
    
    // Calculate genYs for generation labels
    const genYs = [gen0Y];
    const genSet = new Set();
    people.forEach(p => {
        if (p._y !== undefined && !genSet.has(p.gen)) {
            genSet.add(p.gen);
        }
    });
    for (let g = 0; g <= 3; g++) {
        const p = people.find(pp => pp.gen === g && pp._y !== undefined);
        if (p) genYs[g] = p._y;
    }
    return { ...L, genYs, totalTreeW };
}

// 绘制
// ============================================================
const svg = document.getElementById("tree");
const svgWrapper = document.getElementById("svgWrapper");
const treeContainer = document.getElementById("treeContainer");
let currentScale = 1;
let baseSvgW = 0;
let baseSvgH = 0;

function render() {
    const result = calcPositions();
    const { nodeW, nodeH, vGap, topMargin, genYs, mobile } = result;
    // Calculate bounds
    const allX = people.filter(p => p._x !== undefined).map(p => p._x);
    const allY = people.filter(p => p._y !== undefined).map(p => p._y);
    if (allX.length === 0) return;
    const minX = Math.min(...allX) - 40;
    const maxX = Math.max(...allX) + nodeW + 40;
    const maxY = Math.max(...allY) + nodeH + 60;
    const svgW = maxX - minX;
    const svgH = maxY;
    baseSvgW = svgW;
    baseSvgH = svgH;
    const screenW = window.innerWidth;
    if (svgW > screenW) {
        currentScale = screenW / svgW * 0.95;
    } else {
        currentScale = 1;
    }
    svg.setAttribute("width", svgW);
    svg.setAttribute("height", svgH);
    svg.setAttribute("viewBox", `${minX} 0 ${svgW} ${svgH}`);
    updateTransform();
    svg.innerHTML = "";
    // --- 世代分隔线 ---
    const genLabels = ["曾祖辈", "祖辈", "父辈", "我辈"];
    genYs.forEach((y, i) => {
        if (y === undefined) return;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", minX + 10); line.setAttribute("x2", maxX - 10);
        line.setAttribute("y1", y); line.setAttribute("y2", y);
        line.setAttribute("class", "gen-line");
        svg.appendChild(line);
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", minX + 10); text.setAttribute("y", y - 8);
        text.setAttribute("class", "gen-label");
        text.textContent = genLabels[i];
        svg.appendChild(text);
    });
    function curvePath(x1, y1, x2, y2) {
        const midY = (y1 + y2) / 2;
        return `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`;
    }
    const linkElements = [];
    const nodeElements = {};
    // --- 配偶连线 ---
    spouses.forEach(s => {
        const a = personMap[s.a], b = personMap[s.b];
        if (!a || !b || a._x === undefined || b._x === undefined) return;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", a._x + nodeW); line.setAttribute("y1", a._y + nodeH / 2);
        line.setAttribute("x2", b._x); line.setAttribute("y2", b._y + nodeH / 2);
        line.setAttribute("class", "link-spouse");
        svg.appendChild(line);
        const heart = document.createElementNS("http://www.w3.org/2000/svg", "text");
        heart.setAttribute("x", (a._x + nodeW + b._x) / 2);
        heart.setAttribute("y", a._y + nodeH / 2 - 10);
        heart.setAttribute("class", "spouse-symbol");
        heart.textContent = "♡";
        svg.appendChild(heart);
        linkElements.push({ el: line, labelEl: heart, from: s.a, to: s.b, type: "spouse" });
    });
    // --- 亲子连线 ---
    people.forEach(p => {
        if (!p.parentId || p._x === undefined) return;
        const parent = personMap[p.parentId];
        if (!parent || parent._x === undefined) return;
        // Find if parent has a spouse at same generation
        const spouseId = spouseOf[p.parentId];
        let parentCenterX = parent._x + nodeW / 2;
        let coupleIds = [p.parentId];
        if (spouseId && personMap[spouseId] && personMap[spouseId].gen === parent.gen && personMap[spouseId]._x !== undefined) {
            const spouse = personMap[spouseId];
            parentCenterX = (parent._x + spouse._x) / 2 + nodeW / 2;
            coupleIds = [p.parentId, spouseId];
        }
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", curvePath(parentCenterX, parent._y + nodeH, p._x + nodeW / 2, p._y));
        path.setAttribute("class", "link-parent");
        svg.appendChild(path);
        linkElements.push({ el: path, from: p.parentId, to: p.id, type: "parent", coupleIds });
    });
    // --- 节点 ---
    people.forEach(p => {
        if (p._x === undefined) return;
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "node-group");
        g.setAttribute("transform", `translate(${p._x}, ${p._y})`);
        g.dataset.id = p.id;
        const isMale = p.gender === "m";
        const bgColor = isMale ? "#e8f4fd" : "#fef0f5";
        const borderColor = isMale ? "#2980b9" : "#e91e63";
        const textColor = isMale ? "#2471a3" : "#c2185b";
        if (p.isMe) {
            const hl = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            hl.setAttribute("x", -3); hl.setAttribute("y", -3);
            hl.setAttribute("width", nodeW + 6); hl.setAttribute("height", nodeH + 6);
            hl.setAttribute("rx", 12); hl.setAttribute("fill", "none");
            hl.setAttribute("stroke", "#c0392b"); hl.setAttribute("stroke-width", 2.5);
            hl.setAttribute("stroke-dasharray", "5 3");
            g.appendChild(hl);
            const badge = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            badge.setAttribute("x", nodeW - 22); badge.setAttribute("y", -7);
            badge.setAttribute("width", 24); badge.setAttribute("height", 14); badge.setAttribute("rx", 7);
            badge.setAttribute("fill", "#c0392b");
            g.appendChild(badge);
            const bt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            bt.setAttribute("x", nodeW - 10); bt.setAttribute("y", 0);
            bt.setAttribute("class", "me-badge"); bt.setAttribute("fill", "#fff");
            bt.textContent = "我";
            g.appendChild(bt);
        }
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("width", nodeW); rect.setAttribute("height", nodeH);
        rect.setAttribute("class", "node-card");
        rect.setAttribute("fill", bgColor); rect.setAttribute("stroke", borderColor);
        g.appendChild(rect);
        const name = document.createElementNS("http://www.w3.org/2000/svg", "text");
        name.setAttribute("x", nodeW / 2);
        name.setAttribute("y", mobile ? nodeH / 2 : nodeH / 2 - 6);
        name.setAttribute("class", "node-name"); name.setAttribute("fill", textColor);
        // Truncate long names for display
        const displayName = p.id.length > 7 ? p.id.slice(0, 7) : p.id;
        name.textContent = displayName;
        g.appendChild(name);
        if (!mobile) {
            const gender = document.createElementNS("http://www.w3.org/2000/svg", "text");
            gender.setAttribute("x", nodeW / 2); gender.setAttribute("y", nodeH / 2 + 14);
            gender.setAttribute("class", "node-gender"); gender.setAttribute("fill", "#999");
            gender.textContent = isMale ? "♂" : "♀";
            g.appendChild(gender);
        } else {
            const desc = document.createElementNS("http://www.w3.org/2000/svg", "text");
            desc.setAttribute("x", nodeW / 2); desc.setAttribute("y", nodeH / 2 + 12);
            desc.setAttribute("class", "node-desc"); desc.setAttribute("fill", "#aaa");
            desc.textContent = p.desc.length > 6 ? p.desc.slice(0, 6) : p.desc;
            g.appendChild(desc);
        }
        svg.appendChild(g);
        nodeElements[p.id] = { el: g, data: p };
        g.addEventListener("mouseenter", e => highlightNode(p.id, e));
        g.addEventListener("mousemove", e => moveTooltip(e));
        g.addEventListener("mouseleave", clearHighlight);
        g.addEventListener("touchstart", e => { e.preventDefault(); highlightNode(p.id, e.touches[0]); }, { passive: false });
        g.addEventListener("touchend", () => { setTimeout(clearHighlight, 2000); });
    });
    // --- 交互 ---
    function getRelations(nodeId) {
        const rels = [];
        spouses.forEach(s => {
            if (s.a === nodeId) rels.push({ other: s.b, rel: "配偶" });
            if (s.b === nodeId) rels.push({ other: s.a, rel: "配偶" });
        });
        people.forEach(p => {
            if (p.parentId === nodeId) rels.push({ other: p.id, rel: p.gender === "m" ? "儿子" : "女儿" });
        });
        const me = personMap[nodeId];
        if (me && me.parentId) {
            const par = personMap[me.parentId];
            if (par) rels.push({ other: me.parentId, rel: par.gender === "m" ? "父亲" : "母亲" });
            const parentSpouse = spouseOf[me.parentId];
            if (parentSpouse && personMap[parentSpouse] && personMap[parentSpouse].gen === par.gen) {
                if (parentSpouse !== nodeId && !rels.find(r => r.other === parentSpouse)) {
                    const op = personMap[parentSpouse];
                    rels.push({ other: parentSpouse, rel: op.gender === "m" ? "父亲" : "母亲" });
                }
            }
        }
        if (me && me.parentId) {
            people.forEach(p => {
                if (p.id !== nodeId && p.parentId === me.parentId) {
                    rels.push({ other: p.id, rel: p.gender === "m" ? "兄弟" : "姐妹" });
                }
            });
        }
        return rels;
    }
    const tooltip = document.getElementById("tooltip");
    function highlightNode(nodeId, event) {
        const rels = getRelations(nodeId);
        const connected = new Set([nodeId, ...rels.map(r => r.other)]);
        Object.values(nodeElements).forEach(n => {
            if (!connected.has(n.data.id)) { n.el.classList.add("dimmed"); n.el.classList.remove("highlighted"); }
            else { n.el.classList.add("highlighted"); n.el.classList.remove("dimmed"); }
        });
        linkElements.forEach(l => {
            const isRelated = l.from === nodeId || l.to === nodeId || (l.coupleIds && l.coupleIds.includes(nodeId));
            if (isRelated) {
                l.el.classList.add("highlighted"); l.el.classList.remove("dimmed");
                l.el.style.opacity = "0.9"; l.el.style.strokeWidth = "3";
                if (l.labelEl) l.labelEl.classList.remove("dimmed");
            } else {
                l.el.classList.add("dimmed"); l.el.classList.remove("highlighted");
                if (l.labelEl) l.labelEl.classList.add("dimmed");
            }
        });
        const p = personMap[nodeId];
        const relHtml = rels.map(r => `→ ${r.other}：${r.rel}`).join("<br>");
        tooltip.innerHTML = `<div class="name">${p.id}</div><div class="info">${p.desc}</div><div class="rels">${relHtml || "无其他关系"}</div>`;
        tooltip.style.opacity = "1";
        if (isMobile()) { tooltip.style.left = "50%"; tooltip.style.top = "auto"; tooltip.style.bottom = "80px"; tooltip.style.transform = "translateX(-50%)"; }
        else { tooltip.style.transform = "none"; moveTooltip(event); }
    }
    function moveTooltip(e) { if (isMobile()) return; tooltip.style.left = (e.pageX + 14) + "px"; tooltip.style.top = (e.pageY - 10) + "px"; }
    function clearHighlight() {
        Object.values(nodeElements).forEach(n => { n.el.classList.remove("dimmed", "highlighted"); });
        linkElements.forEach(l => {
            l.el.classList.remove("dimmed", "highlighted"); l.el.style.opacity = ""; l.el.style.strokeWidth = "";
            if (l.labelEl) l.labelEl.classList.remove("dimmed", "highlighted");
        });
        tooltip.style.opacity = "0";
    }
    updateZoomDisplay();
}

function updateTransform() {
    svgWrapper.style.transform = `scale(${currentScale})`;
    svgWrapper.style.transformOrigin = "top center";
    // Update container size to match scaled content
    const scaledW = baseSvgW * currentScale;
    const scaledH = baseSvgH * currentScale;
    treeContainer.style.minHeight = scaledH + "px";
}

function updateZoomDisplay() {
    const zoomLevel = document.getElementById("zoomLevel");
    zoomLevel.textContent = Math.round(currentScale * 100) + "%";
}

window._zoomIn = function() {
    currentScale = Math.min(currentScale * 1.3, 5);
    updateTransform();
    updateZoomDisplay();
};

window._zoomOut = function() {
    currentScale = Math.max(currentScale / 1.3, 0.3);
    updateTransform();
    updateZoomDisplay();
};

window._zoomFit = function() {
    const screenW = window.innerWidth;
    if (baseSvgW > screenW) {
        currentScale = screenW / baseSvgW * 0.95;
    } else {
        currentScale = 1;
    }
    updateTransform();
    updateZoomDisplay();
};

document.getElementById("zoomIn").addEventListener("click", window._zoomIn);
document.getElementById("zoomOut").addEventListener("click", window._zoomOut);
document.getElementById("zoomFit").addEventListener("click", window._zoomFit);
render();
let resizeTimer;
window.addEventListener("resize", () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(render, 200); });
// 鼠标滚轮缩放
treeContainer.addEventListener("wheel", (e) => {
    if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        currentScale = Math.max(0.3, Math.min(5, currentScale * delta));
        updateTransform();
        updateZoomDisplay();
    }
}, { passive: false });
// 触摸缩放
let lastTouchDist = 0;
let lastScale = 1;
svg.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].pageX - e.touches[1].pageX;
        const dy = e.touches[0].pageY - e.touches[1].pageY;
        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
        lastScale = currentScale;
    }
}, { passive: false });
